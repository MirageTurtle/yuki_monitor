name: Daily Mirror Check

on:
  schedule:
    - cron: "37 14 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download latest release binary
        uses: actions/download-artifact@v4
        with:
          name: yuki_monitor

      - name: Make binary executable
        run: chmod +x yuki_monitor

      - name: Run mirror check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO_WHITELIST: ${{ vars.REPO_WHITELIST }}
        run: ./yuki_monitor
