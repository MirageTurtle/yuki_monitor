name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --locked

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release
          cp target/release/yuki_monitor release/
          tar -czvf yuki_monitor-${TAG}.tar.gz -C release yuki_monitor
        env:
          TAG: ${{ github.ref_name }}

      - name: Upload release asset
        uses: actions/upload-artifact@7
        with:
          files: yuki_monitor-${TAG}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
